<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Dark navy background -->
  <rect width="128" height="128" rx="22" fill="#0d1b2a"/>

  <!-- Football (soccer ball) centered -->
  <!-- Main white circle -->
  <circle cx="64" cy="64" r="38" fill="#f0f0f0" stroke="#222" stroke-width="1.5"/>

  <!-- Classic football pentagon/hexagon patch pattern -->
  <!-- Central black pentagon -->
  <polygon points="64,38 76,47 71,60 57,60 52,47" fill="#1a1a2e"/>
  <!-- Surrounding black pentagons (5 around the center) -->
  <polygon points="64,26 70,34 64,38 58,34" fill="#1a1a2e"/>
  <polygon points="84,40 84,49 76,47 78,38" fill="#1a1a2e"/>
  <polygon points="80,65 71,68 71,60 79,57" fill="#1a1a2e"/>
  <polygon points="48,65 49,57 57,60 57,68" fill="#1a1a2e"/>
  <polygon points="44,40 50,38 52,47 44,49" fill="#1a1a2e"/>

  <!-- Shine highlight -->
  <ellipse cx="52" cy="48" rx="9" ry="6" fill="white" opacity="0.18" transform="rotate(-30 52 48)"/>
</svg>
